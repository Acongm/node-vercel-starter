<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat Logs · api.acongm.com</title>
    <link rel="stylesheet" href="./api-demo.css" />
    <style>
      .log-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      .log-table th,
      .log-table td {
        border-bottom: 1px solid var(--border);
        padding: 8px 10px;
        text-align: left;
        vertical-align: top;
      }

      .log-table tbody tr {
        cursor: pointer;
      }

      .log-table tbody tr:hover {
        background: #f3f6fc;
      }

      .log-table tbody tr.selected {
        background: #e8eefc;
      }

      .filters {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }

      .detail-panel {
        margin-top: 16px;
        padding: 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #fafbfd;
      }

      .detail-panel pre {
        white-space: pre-wrap;
        word-break: break-word;
      }

      .summary {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 12px;
      }

      .login-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
        max-width: 640px;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <nav>
        <strong>Navigation</strong>
        <a href="./index.html">API Debug Console</a>
        <a href="#login">Login</a>
        <a href="#filters">Filters</a>
        <a href="#logs">Logs</a>
      </nav>

      <main>
        <h1>Chat Logs</h1>
        <p class="hint">
          管理员登录后可查看全部对话记录。筛选条件均为可选；留空即全量查询。
        </p>
        <p id="auth-user-line" class="summary">未登录</p>

        <section id="login">
          <div id="login-panel">
            <h2>Login</h2>
            <div class="path"><span class="method method-post">POST</span>/api/ai/chat/logs/session/login</div>
            <div class="login-grid">
              <div>
                <label for="login-username">账号</label>
                <input id="login-username" type="text" autocomplete="username" />
              </div>
              <div>
                <label for="login-password">密码</label>
                <input id="login-password" type="password" autocomplete="current-password" />
              </div>
            </div>
            <div class="actions">
              <button id="login-btn" type="button">登录</button>
            </div>
          </div>
        </section>

        <section id="filters">
          <div id="filters-panel" hidden>
            <h2>Filters（均可选）</h2>
            <div class="path"><span class="method method-get">GET</span>/api/ai/chat/logs</div>
            <div class="filters">
              <div>
                <label for="filter-client-id">clientId（可选）</label>
                <input id="filter-client-id" type="text" placeholder="留空查全部" />
              </div>
              <div>
                <label for="filter-call-source">callSource（可选）</label>
                <input id="filter-call-source" type="text" placeholder="vuepress:article-panel" />
              </div>
              <div>
                <label for="filter-page-path">pagePath（可选）</label>
                <input id="filter-page-path" type="text" placeholder="/daily-news/..." />
              </div>
              <div>
                <label for="filter-from">from（可选）</label>
                <input id="filter-from" type="text" placeholder="2026-06-01T00:00:00.000Z" />
              </div>
              <div>
                <label for="filter-to">to（可选）</label>
                <input id="filter-to" type="text" placeholder="2026-06-30T23:59:59.999Z" />
              </div>
              <div>
                <label for="filter-limit">limit</label>
                <input id="filter-limit" type="number" value="200" min="1" max="500" />
              </div>
            </div>
            <div class="actions">
              <button id="load-logs-btn" type="button">加载全部记录</button>
              <button id="clear-filters-btn" type="button" class="secondary">清空筛选</button>
              <button id="prev-page-btn" type="button" class="secondary">上一页</button>
              <button id="next-page-btn" type="button" class="secondary">下一页</button>
              <button id="logout-btn" type="button" class="secondary">退出登录</button>
            </div>
            <p id="status-line" class="summary">尚未加载。</p>
          </div>
        </section>

        <section id="logs">
          <h2>Records</h2>
          <table class="log-table">
            <thead>
              <tr>
                <th>时间</th>
                <th>clientId</th>
                <th>callSource</th>
                <th>endpoint</th>
                <th>标题</th>
                <th>用户消息</th>
              </tr>
            </thead>
            <tbody id="logs-body">
              <tr>
                <td colspan="6">请先登录。</td>
              </tr>
            </tbody>
          </table>
          <div id="detail-panel" class="detail-panel" hidden>
            <h3>详情</h3>
            <pre id="detail-output"></pre>
          </div>
        </section>
      </main>
    </div>
    <script defer src="./chat-logs.js"></script>
  </body>
</html>
